<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" width="640" height="290">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="640" height="290" fill="#ffffff" rx="8"/>
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Fig. 4.1  结构化提示词 vs 纯文本提示词的版本管理对比</text>

  <text x="320" y="42" text-anchor="middle" font-size="11" fill="#868e96">场景：将 code_review_agent 的角色从"后端工程师"改为"全栈工程师"</text>

  <!-- 左栏 -->
  <rect x="15" y="54" width="295" height="210" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="162" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">纯文本方式的 diff</text>
  <line x1="25" y1="82" x2="300" y2="82" stroke="#dee2e6" stroke-width="0.8"/>
  <text x="25" y="100" font-size="11" fill="#868e96" font-family="monospace">--- a/messages.yaml</text>
  <text x="25" y="114" font-size="11" fill="#868e96" font-family="monospace">+++ b/messages.yaml</text>
  <text x="25" y="146" font-size="11" fill="#495057">  - role: system</text>
  <rect x="22" y="154" width="280" height="38" rx="2" fill="#ffe0e0"/>
  <text x="25" y="168" font-size="10" fill="#e03131">-    "你是一位资深 Python 后端工程师，</text>
  <text x="25" y="182" font-size="10" fill="#e03131">     擅长性能优化和安全审查。"</text>
  <rect x="22" y="192" width="280" height="38" rx="2" fill="#d3f9d8"/>
  <text x="25" y="206" font-size="10" fill="#2f9e44">+    "你是一位资深 Python 全栈工程师，</text>
  <text x="25" y="220" font-size="10" fill="#2f9e44">     擅长性能优化、安全审查和前端可访问性。"</text>
  <text x="25" y="250" font-size="11" fill="#adb5bd">→ 看到的是"删了 2 个字，加了 8 个字"</text>

  <!-- 分隔线 -->
  <line x1="320" y1="68" x2="320" y2="258" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="320" y="60" text-anchor="middle" font-size="16" fill="#adb5bd">⇄</text>

  <!-- 右栏 -->
  <rect x="330" y="54" width="295" height="210" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="477" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">结构化方式的语义 diff</text>
  <line x1="340" y1="82" x2="615" y2="82" stroke="#dee2e6" stroke-width="0.8"/>

  <text x="345" y="108" font-size="12" font-weight="600" fill="#1971c2">components.role.text:</text>
  <rect x="345" y="116" width="265" height="20" rx="3" fill="#ffe0e0"/>
  <text x="350" y="131" font-size="11" fill="#e03131">- "...后端工程师..."</text>
  <rect x="345" y="136" width="265" height="20" rx="3" fill="#d3f9d8"/>
  <text x="350" y="151" font-size="11" fill="#2f9e44">+ "...全栈工程师..."</text>

  <text x="345" y="178" font-size="12" font-weight="600" fill="#7950f2">components.role.changelog:</text>
  <rect x="345" y="186" width="265" height="20" rx="3" fill="#f3f0ff"/>
  <text x="350" y="201" font-size="11" fill="#6741d9">"v2.1: 增加了全栈和前端可访问性"</text>

  <text x="345" y="228" font-size="11" fill="#adb5bd">→ 看到的是"修改了 role 组件，</text>
  <text x="345" y="244" font-size="11" fill="#adb5bd">   changelog 记录了修改原因"</text>
</svg>