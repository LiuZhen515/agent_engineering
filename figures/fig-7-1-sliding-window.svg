<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .seg-label { font-size: 12px; font-weight: 600; fill: #343a40; }
      .token-num { font-size: 11px; fill: #495057; }
      .trigger { font-size: 11px; fill: #e03131; }
      .box-label { font-size: 10px; fill: #868e96; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#868e96"/>
    </marker>
  </defs>

  <rect width="700" height="200" fill="#ffffff" rx="8"/>
  <text x="330" y="22" text-anchor="middle" class="title">Fig. 7.1  滚动窗口截断策略</text>

  <!-- 上下文窗口（32K Token 上限） -->
  <text x="14" y="48" class="box-label">上下文窗口（32K Token 上限）：</text>

  <!-- box 外框 -->
  <rect x="14" y="54" width="632" height="36" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1.5"/>

  <!-- P 段 -->
  <rect x="16" y="56" width="94" height="32" rx="3" fill="#e7f5ff" stroke="#339af0" stroke-width="1.2"/>
  <text x="63" y="76" text-anchor="middle" class="seg-label" fill="#1c7ed6">P (系统提示词)</text>

  <!-- H 段 -->
  <rect x="112" y="56" width="420" height="32" fill="#d3f9d8" stroke="#40c057" stroke-width="1.2"/>
  <text x="322" y="76" text-anchor="middle" class="seg-label" fill="#2b8a3e">H (对话历史，滚动保留最近 N 轮)</text>

  <!-- 当前消息段 -->
  <rect x="534" y="56" width="108" height="32" rx="3" fill="#fff4e6" stroke="#f76707" stroke-width="1.2"/>
  <text x="588" y="76" text-anchor="middle" class="seg-label" fill="#d9480f">当前消息</text>

  <!-- Token 数 -->
  <text x="63" y="106" text-anchor="middle" class="token-num">固定 ~1K Token</text>
  <text x="322" y="106" text-anchor="middle" class="token-num">滚动 ~8K Token</text>
  <text x="588" y="106" text-anchor="middle" class="token-num">~1K Token</text>

  <!-- 触发箭头 -->
  <line x1="626" y1="106" x2="646" y2="106" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="330" y="130" text-anchor="middle" class="trigger">触发截断条件时：保留 P + 最近 N/2 轮对话，移除较早日志</text>

</svg>