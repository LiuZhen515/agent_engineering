<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 380" width="550" height="380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .node-title { font-size: 13px; font-weight: 600; fill: #1e1e1e; }
      .node-desc { font-size: 10px; font-weight: 400; fill: #495057; }
      .action-text { font-size: 11px; font-weight: 400; fill: #495057; }
      .caption { font-size: 11px; fill: #adb5bd; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#868e96"/>
    </marker>
  </defs>

  <rect width="550" height="380" fill="#ffffff" rx="8"/>
  <text x="275" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1e1e">Fig. 14.1  子目标树示例（深度=3, 分支数=2~3）</text>

  <!-- === 根节点 === -->
  <rect x="187" y="44" width="176" height="44" rx="22" fill="#f3f0ff" stroke="#9775fa" stroke-width="2"/>
  <text x="275" y="64" text-anchor="middle" class="node-title">📋 审查 PR #123</text>
  <text x="275" y="80" text-anchor="middle" class="node-desc">根目标</text>

  <!-- 根 → 3 个子目标连线 -->
  <line x1="240" y1="88" x2="145" y2="132" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="275" y1="88" x2="275" y2="132" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="88" x2="405" y2="132" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === 子目标 1（左）x=36~192 === -->
  <rect x="36" y="134" width="156" height="38" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="114" y="152" text-anchor="middle" class="node-title">获取 PR 变更信息</text>
  <text x="114" y="165" text-anchor="middle" class="node-desc">子目标 1/3</text>

  <!-- 子目标1 → 动作 -->
  <line x1="88" y1="172" x2="72" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="140" y1="172" x2="155" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="38" y="208" width="68" height="34" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1" fill-opacity="0.5"/>
  <text x="72" y="225" text-anchor="middle" class="action-text">clone_repo</text>
  <text x="72" y="238" text-anchor="middle" class="node-desc">克隆仓库</text>

  <rect x="122" y="208" width="66" height="34" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1" fill-opacity="0.5"/>
  <text x="155" y="225" text-anchor="middle" class="action-text">get_pr_diff</text>
  <text x="155" y="238" text-anchor="middle" class="node-desc">获取变更 diff</text>

  <!-- === 子目标 2（中）x=196~354 === -->
  <rect x="196" y="134" width="158" height="38" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="275" y="152" text-anchor="middle" class="node-title">分析代码变更</text>
  <text x="275" y="165" text-anchor="middle" class="node-desc">子目标 2/3</text>

  <!-- 子目标2 → 动作 -->
  <line x1="239" y1="172" x2="228" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="172" x2="320" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="196" y="208" width="64" height="34" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1" fill-opacity="0.5"/>
  <text x="228" y="225" text-anchor="middle" class="action-text">run_linter</text>
  <text x="228" y="238" text-anchor="middle" class="node-desc">检查代码风格</text>

  <rect x="288" y="208" width="64" height="34" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1" fill-opacity="0.5"/>
  <text x="320" y="225" text-anchor="middle" class="action-text">analyze_diff</text>
  <text x="320" y="238" text-anchor="middle" class="node-desc">分析变更逻辑</text>

  <!-- === 子目标 3（右）x=356~514 === -->
  <rect x="356" y="134" width="158" height="38" rx="8" fill="#fff4e6" stroke="#f76707" stroke-width="2"/>
  <text x="435" y="152" text-anchor="middle" class="node-title">生成审查报告</text>
  <text x="435" y="165" text-anchor="middle" class="node-desc">子目标 3/3</text>

  <!-- 子目标3 → 动作 -->
  <line x1="400" y1="172" x2="392" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="470" y1="172" x2="478" y2="206" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="360" y="208" width="64" height="34" rx="6" fill="#fff4e6" stroke="#f76707" stroke-width="1" fill-opacity="0.5"/>
  <text x="392" y="225" text-anchor="middle" class="action-text">summarize</text>
  <text x="392" y="238" text-anchor="middle" class="node-desc">汇总问题</text>

  <rect x="446" y="208" width="64" height="34" rx="6" fill="#fff4e6" stroke="#f76707" stroke-width="1" fill-opacity="0.5"/>
  <text x="478" y="225" text-anchor="middle" class="action-text">format_report</text>
  <text x="478" y="238" text-anchor="middle" class="node-desc">格式化报告</text>

  <!-- ===== 底部虚线框：聚合结果 ===== -->
  <rect x="136" y="270" width="278" height="44" rx="22" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="275" y="290" text-anchor="middle" class="node-title">📝 合并审查评论</text>
  <text x="275" y="306" text-anchor="middle" class="node-desc">汇总三个子目标输出 → 生成 Review Report</text>

  <line x1="114" y1="242" x2="200" y2="270" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="275" y1="242" x2="275" y2="270" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="435" y1="242" x2="350" y2="270" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <text x="275" y="358" text-anchor="middle" class="caption">根目标分解为独立子目标，每个子目标对应若干原子动作</text>
</svg>