<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" width="700" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 16px; font-weight: 600; fill: #1e1e1e; }
      .col { font-size: 13px; font-weight: 700; fill: #1e1e1e; }
      .col-sub { font-size: 10px; font-weight: 400; fill: #868e96; }
      .row { font-size: 12px; font-weight: 600; fill: #343a40; }
      .cell-active { font-size: 11px; font-weight: 600; fill: #339af0; }
      .cell-text { font-size: 10px; font-weight: 400; fill: #495057; }
      .cell-inactive { font-size: 10px; fill: #adb5bd; font-family: monospace; }
      .note-title { font-size: 11px; font-weight: 600; fill: #1e1e1e; }
      .note-text { font-size: 10px; fill: #495057; }
      .legend { font-size: 10px; fill: #868e96; font-family: monospace; }
    </style>
  </defs>

  <rect width="700" height="540" fill="#ffffff" rx="8"/>
  <text x="350" y="26" text-anchor="middle" class="title">Fig 1.3  时间维度 × 抽象层级的二维矩阵</text>

  <!-- ===== 列标题 ===== -->
  <text x="230" y="56" text-anchor="middle" class="col">Token 层</text><text x="230" y="70" text-anchor="middle" class="col-sub">(Prompt)</text>
  <text x="350" y="56" text-anchor="middle" class="col">Window 层</text><text x="350" y="70" text-anchor="middle" class="col-sub">(Context)</text>
  <text x="470" y="56" text-anchor="middle" class="col">Runtime 层</text><text x="470" y="70" text-anchor="middle" class="col-sub">(Harness)</text>
  <text x="590" y="56" text-anchor="middle" class="col">System 层</text><text x="590" y="70" text-anchor="middle" class="col-sub">(Loop)</text>

  <!-- 列分隔线 -->
  <line x1="85" y1="80" x2="650" y2="80" stroke="#dee2e6" stroke-width="1"/>
  <line x1="170" y1="80" x2="170" y2="390" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="290" y1="80" x2="290" y2="390" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="410" y1="80" x2="410" y2="390" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="530" y1="80" x2="530" y2="390" stroke="#dee2e6" stroke-width="0.5"/>
  <line x1="650" y1="80" x2="650" y2="390" stroke="#dee2e6" stroke-width="0.5"/>

  <!-- ===== 行 1：毫秒级（推理）===== -->
  <text x="165" y="125" text-anchor="end" class="row">毫秒级(推理)</text>
  <line x1="85" y1="155" x2="650" y2="155" stroke="#dee2e6" stroke-width="0.5"/>

  <rect x="170" y="80" width="120" height="75" fill="#e7f5ff"/>
  <text x="230" y="117" text-anchor="middle" class="cell-active">██████</text>
  <text x="230" y="135" text-anchor="middle" class="cell-text">Prompt 设计</text>

  <rect x="290" y="80" width="120" height="75" fill="#f8f9fa"/>
  <text x="350" y="125" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <rect x="410" y="80" width="120" height="75" fill="#f8f9fa"/>
  <text x="470" y="125" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <rect x="530" y="80" width="120" height="75" fill="#f8f9fa"/>
  <text x="590" y="125" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <!-- ===== 行 2：秒级（对话）===== -->
  <text x="165" y="200" text-anchor="end" class="row">秒级(对话)</text>
  <line x1="85" y1="232" x2="650" y2="232" stroke="#dee2e6" stroke-width="0.5"/>

  <rect x="170" y="155" width="120" height="77" fill="#d0ebff"/>
  <text x="230" y="192" text-anchor="middle" class="cell-active">██████</text>
  <text x="230" y="210" text-anchor="middle" class="cell-text">对话延续</text>

  <rect x="290" y="155" width="120" height="77" fill="#d3f9d8"/>
  <text x="350" y="192" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#40c057">██████</text>
  <text x="350" y="210" text-anchor="middle" class="cell-text">上下文管理</text>

  <rect x="410" y="155" width="120" height="77" fill="#f8f9fa"/>
  <text x="470" y="198" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <rect x="530" y="155" width="120" height="77" fill="#f8f9fa"/>
  <text x="590" y="198" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <!-- ===== 行 3：分–小时级（任务）===== -->
  <text x="165" y="275" text-anchor="end" class="row">分–小时级(任务)</text>
  <line x1="85" y1="310" x2="650" y2="310" stroke="#dee2e6" stroke-width="0.5"/>

  <rect x="170" y="232" width="120" height="78" fill="#d0ebff"/>
  <text x="230" y="270" text-anchor="middle" class="cell-active">██████</text>
  <text x="230" y="288" text-anchor="middle" class="cell-text">子任务提示</text>

  <rect x="290" y="232" width="120" height="78" fill="#d3f9d8"/>
  <text x="350" y="270" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#40c057">██████</text>
  <text x="350" y="288" text-anchor="middle" class="cell-text">中间结果缓存</text>

  <rect x="410" y="232" width="120" height="78" fill="#fff4e6"/>
  <text x="470" y="270" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#f76707">██████</text>
  <text x="470" y="288" text-anchor="middle" class="cell-text">工具调用循环</text>

  <rect x="530" y="232" width="120" height="78" fill="#f3f0ff"/>
  <text x="590" y="270" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#9775fa">██████</text>
  <text x="590" y="288" text-anchor="middle" class="cell-text">目标分解与反思</text>

  <!-- ===== 行 4：天–月级（自进化）===== -->
  <text x="165" y="355" text-anchor="end" class="row">天–月级(自进化)</text>
  <line x1="85" y1="390" x2="650" y2="390" stroke="#dee2e6" stroke-width="0.5"/>

  <rect x="170" y="310" width="120" height="80" fill="#f8f9fa"/>
  <text x="230" y="350" text-anchor="middle" class="cell-inactive">░░░░░░</text>

  <rect x="290" y="310" width="120" height="80" fill="#d3f9d8"/>
  <text x="350" y="348" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#40c057">██████</text>
  <text x="350" y="366" text-anchor="middle" class="cell-text">经验积累</text>

  <rect x="410" y="310" width="120" height="80" fill="#fff4e6"/>
  <text x="470" y="348" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#f76707">██████</text>
  <text x="470" y="366" text-anchor="middle" class="cell-text">策略优化</text>

  <rect x="530" y="310" width="120" height="80" fill="#f3f0ff"/>
  <text x="590" y="348" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#9775fa">██████</text>
  <text x="590" y="366" text-anchor="middle" class="cell-text">学习型循环</text>

  <!-- ===== 底部图例和注释 ===== -->
  <line x1="85" y1="405" x2="650" y2="405" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="90" y="420" class="legend">██ = 活跃    ░░ = 非活跃或轻量参与</text>

  <text x="90" y="440" class="note-title">图注：</text>
  <text x="90" y="456" class="note-text">毫秒级——单次推理。Prompt 工程师关心在极短时间内的 Token 序列设计。</text>
  <text x="90" y="469" class="note-text">秒级——一轮对话。Context 工程师管理对话延续性和历史缓存。</text>
  <text x="90" y="482" class="note-text">分到小时级——一次任务。Harness 提供运行时持久化，Loop 管理推进和恢复。</text>
  <text x="90" y="495" class="note-text">天到月级——长程记忆与自进化。学习型循环的核心战场。</text>
</svg>