<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" width="480" height="420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .node-title { font-size: 12px; font-weight: 600; fill: #1e1e1e; }
      .node-sub { font-size: 10px; font-weight: 400; fill: #6c757d; }
      .edge-label { font-size: 10px; font-weight: 600; fill: #339af0; }
      .loop-label { font-size: 10px; font-weight: 600; fill: #f76707; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#868e96"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f76707"/>
    </marker>
  </defs>

  <rect width="480" height="420" fill="#ffffff" rx="8"/>
  <text x="240" y="24" text-anchor="middle" class="title">Fig. 9.2  Harness 调度循环</text>

  <!-- ===== 1. 用户输入 ===== -->
  <rect x="80" y="34" width="200" height="36" rx="18" fill="#f3f0ff" stroke="#9775fa" stroke-width="2"/>
  <text x="180" y="57" text-anchor="middle" class="node-title">用户输入</text>

  <line x1="180" y1="70" x2="180" y2="90" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 2. LLM 调用 ===== -->
  <rect x="60" y="92" width="240" height="44" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="180" y="112" text-anchor="middle" class="node-title">LLM 调用</text>
  <text x="180" y="128" text-anchor="middle" class="node-sub">生成回复 / 工具调用指令</text>

  <line x1="180" y1="136" x2="180" y2="160" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 3. 菱形：含工具调用？ ===== -->
  <polygon points="180,162 280,202 180,242 80,202" fill="#fff4e6" stroke="#f76707" stroke-width="2"/>
  <text x="180" y="200" text-anchor="middle" class="node-title">含工具调用？</text>

  <!-- 是 → 向右 -->
  <line x1="280" y1="202" x2="310" y2="202" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="298" y="194" text-anchor="middle" class="edge-label">是</text>

  <!-- 否 → 向下 -->
  <line x1="180" y1="242" x2="180" y2="278" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="192" y="263" text-anchor="start" class="edge-label">否</text>

  <!-- ===== 4a. 执行工具 ===== -->
  <rect x="310" y="180" width="155" height="44" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="387" y="200" text-anchor="middle" class="node-title">执行工具</text>
  <text x="387" y="216" text-anchor="middle" class="node-sub">结果写回上下文 O 分量</text>

  <line x1="387" y1="224" x2="387" y2="248" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 继续循环节点 ===== -->
  <rect x="335" y="250" width="105" height="32" rx="16" fill="#fff4e6" stroke="#f76707" stroke-width="1.5"/>
  <text x="387" y="270" text-anchor="middle" class="node-title">继续循环</text>

  <!-- 循环箭头：从继续循环框右侧出发，绕过执行工具右侧，回到 LLM 调用 -->
  <path d="M440,266 L480,266 L480,114 L300,114" fill="none" stroke="#f76707" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- ===== 5. 输出回复 ===== -->
  <rect x="60" y="280" width="240" height="44" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="180" y="300" text-anchor="middle" class="node-title">输出回复</text>
  <text x="180" y="316" text-anchor="middle" class="node-sub">将最终内容返回给用户</text>

  <line x1="180" y1="324" x2="180" y2="350" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 6. 结束 ===== -->
  <rect x="110" y="352" width="140" height="36" rx="18" fill="#f3f0ff" stroke="#9775fa" stroke-width="2"/>
  <text x="180" y="375" text-anchor="middle" class="node-title">结束</text>

</svg>