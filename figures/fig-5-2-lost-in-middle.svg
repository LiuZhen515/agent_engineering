<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 360" width="550" height="360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .subtitle { font-size: 11px; font-weight: 400; fill: #868e96; }
      .axis-label { font-size: 11px; font-weight: 400; fill: #868e96; }
      .axis-title { font-size: 12px; font-weight: 600; fill: #495057; }
      .x-label { font-size: 12px; font-weight: 600; fill: #495057; }
      .data-label { font-size: 11px; font-weight: 600; fill: #339af0; }
      .caption { font-size: 10px; fill: #adb5bd; }
    </style>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#868e96"/>
    </marker>
  </defs>

  <rect width="550" height="360" fill="#ffffff" rx="8"/>
  <text x="275" y="22" text-anchor="middle" class="title">Fig. 5.2  Lost in the Middle 定性复现</text>
  <text x="275" y="38" text-anchor="middle" class="subtitle">（据 Liu et al., 2023 Fig. 2 / 表 1 数据，GPT-3.5-turbo, 20 documents）</text>

  <!-- ===== Y 轴 ===== -->
  <line x1="70" y1="55" x2="70" y2="285" stroke="#868e96" stroke-width="1.5"/>
  <!-- Y 轴上箭头 -->
  <polygon points="66,55 70,45 74,55" fill="#868e96"/>

  <!-- Y 轴刻度: 0, 20, 40, 60, 80, 100 | 图表高度 230px (y:55~285) -->
  <!-- 0% at y=285, 100% at y=55, step = 230/5 = 46px per 20% -->
  <!-- 100 -->
  <text x="62" y="59" text-anchor="end" class="axis-label">100%</text>
  <line x1="65" y1="55" x2="75" y2="55" stroke="#868e96" stroke-width="1"/>
  <!-- 80 -->
  <text x="62" y="105" text-anchor="end" class="axis-label">80%</text>
  <line x1="65" y1="101" x2="75" y2="101" stroke="#868e96" stroke-width="1"/>
  <line x1="70" y1="101" x2="510" y2="101" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- 60 -->
  <text x="62" y="151" text-anchor="end" class="axis-label">60%</text>
  <line x1="65" y1="147" x2="75" y2="147" stroke="#868e96" stroke-width="1"/>
  <line x1="70" y1="147" x2="510" y2="147" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- 40 -->
  <text x="62" y="197" text-anchor="end" class="axis-label">40%</text>
  <line x1="65" y1="193" x2="75" y2="193" stroke="#868e96" stroke-width="1"/>
  <line x1="70" y1="193" x2="510" y2="193" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- 20 -->
  <text x="62" y="243" text-anchor="end" class="axis-label">20%</text>
  <line x1="65" y1="239" x2="75" y2="239" stroke="#868e96" stroke-width="1"/>
  <!-- 0 -->
  <text x="62" y="289" text-anchor="end" class="axis-label">0%</text>
  <line x1="65" y1="285" x2="75" y2="285" stroke="#868e96" stroke-width="1"/>

  <text x="40" y="173" text-anchor="middle" transform="rotate(-90,40,173)" class="axis-title">遵守率</text>

  <!-- ===== X 轴 ===== -->
  <line x1="70" y1="285" x2="510" y2="285" stroke="#868e96" stroke-width="1.5"/>

  <!-- X 轴标签 -->
  <text x="100" y="305" text-anchor="middle" class="x-label">开头</text>
  <text x="210" y="305" text-anchor="middle" class="x-label">1/4 处</text>
  <text x="320" y="305" text-anchor="middle" class="x-label">中间</text>
  <text x="430" y="305" text-anchor="middle" class="x-label">3/4 处</text>
  <text x="510" y="305" text-anchor="middle" class="x-label">末尾</text>

  <!-- ===== 数据点 ===== -->
  <!-- 范围: y从285(0%)到55(100%), 共230px = 每% 2.3px -->
  <!-- y = 285 - value * 2.3 -->
  <!-- 
    开头(76%):   y = 285 - 76*2.3 = 285 - 174.8 = 110.2, x=100
    1/4处(57%):  y = 285 - 57*2.3 = 285 - 131.1 = 153.9, x=210
    中间(54%):   y = 285 - 54*2.3 = 285 - 124.2 = 160.8, x=320
    3/4处(55%):  y = 285 - 55*2.3 = 285 - 126.5 = 158.5, x=430
    末尾(63%):   y = 285 - 63*2.3 = 285 - 144.9 = 140.1, x=510
  -->

  <!-- 曲线 -->
  <polyline points="100,110.2 210,153.9 320,160.8 430,158.5 510,140.1"
            fill="none" stroke="#339af0" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 数据点 -->
  <circle cx="100" cy="110.2" r="5" fill="#ffffff" stroke="#339af0" stroke-width="2.5"/>
  <circle cx="210" cy="153.9" r="5" fill="#ffffff" stroke="#339af0" stroke-width="2.5"/>
  <circle cx="320" cy="160.8" r="5" fill="#ffffff" stroke="#339af0" stroke-width="2.5"/>
  <circle cx="430" cy="158.5" r="5" fill="#ffffff" stroke="#339af0" stroke-width="2.5"/>
  <circle cx="510" cy="140.1" r="5" fill="#ffffff" stroke="#339af0" stroke-width="2.5"/>

  <!-- 数值标签 -->
  <text x="100" y="102.2" text-anchor="middle" class="data-label">76%</text>
  <text x="210" y="145.9" text-anchor="middle" class="data-label">57%</text>
  <text x="320" y="152.8" text-anchor="middle" class="data-label">54%</text>
  <text x="430" y="150.5" text-anchor="middle" class="data-label">55%</text>
  <text x="510" y="132.1" text-anchor="middle" class="data-label">63%</text>

  <!-- 脚注 -->
  <text x="275" y="340" text-anchor="middle" class="caption">数据来源：Liu et al. (2023) Table 1, GPT-3.5-turbo, 20 retrieved documents</text>

</svg>