<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .node-title { font-size: 13px; font-weight: 600; fill: #1e1e1e; }
      .node-desc { font-size: 10px; font-weight: 400; fill: #495057; }
      .edge-label { font-size: 10px; font-weight: 600; fill: #495057; }
      .caption { font-size: 11px; fill: #adb5bd; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#868e96"/>
    </marker>
  </defs>

  <rect width="500" height="400" fill="#ffffff" rx="8"/>
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1e1e">Fig. 16.1  经验回放 → 提示词优化流水线</text>

  <!-- ===== 顶部入口 ===== -->
  <rect x="170" y="46" width="160" height="38" rx="19" fill="#f3f0ff" stroke="#9775fa" stroke-width="2"/>
  <text x="250" y="64" text-anchor="middle" class="node-title">🚀 Agent 执行轨迹</text>
  <text x="250" y="78" text-anchor="middle" class="node-desc">记录完整交互日志</text>

  <!-- 分叉 -->
  <line x1="250" y1="84" x2="250" y2="108" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="108" x2="140" y2="108" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="108" x2="360" y2="108" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="108" x2="140" y2="128" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="108" x2="360" y2="128" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 左分支：成功轨迹 ===== -->
  <rect x="50" y="132" width="180" height="38" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="140" y="150" text-anchor="middle" class="node-title">✅ 成功轨迹</text>
  <text x="140" y="164" text-anchor="middle" class="node-desc">目标达成</text>

  <line x1="140" y1="170" x2="140" y2="196" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="200" width="180" height="38" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="1" fill-opacity="0.5"/>
  <text x="140" y="218" text-anchor="middle" class="node-title">🔍 正向模式提取</text>
  <text x="140" y="232" text-anchor="middle" class="node-desc">识别有效策略路径</text>

  <line x1="140" y1="238" x2="140" y2="264" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 左分支分叉 -->
  <line x1="140" y1="264" x2="100" y2="264" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="264" x2="180" y2="264" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="264" x2="100" y2="280" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="264" x2="180" y2="280" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="284" width="90" height="34" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="0.8" fill-opacity="0.3"/>
  <text x="95" y="300" text-anchor="middle" class="node-desc">📋 Prompt 追加</text>
  <text x="95" y="314" text-anchor="middle" class="node-desc">少样本示例池</text>

  <rect x="150" y="284" width="90" height="34" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="0.8" fill-opacity="0.3"/>
  <text x="195" y="300" text-anchor="middle" class="node-desc">🔧 工具描述优化</text>
  <text x="195" y="314" text-anchor="middle" class="node-desc">固化优秀调用</text>

  <!-- ===== 右分支：失败轨迹 ===== -->
  <rect x="270" y="132" width="180" height="38" rx="8" fill="#fff4e6" stroke="#f76707" stroke-width="2"/>
  <text x="360" y="150" text-anchor="middle" class="node-title">❌ 失败轨迹</text>
  <text x="360" y="164" text-anchor="middle" class="node-desc">目标未达成 / 异常退出</text>

  <line x1="360" y1="170" x2="360" y2="196" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="270" y="200" width="180" height="38" rx="8" fill="#fff4e6" stroke="#f76707" stroke-width="1" fill-opacity="0.5"/>
  <text x="360" y="218" text-anchor="middle" class="node-title">🔍 错误分析</text>
  <text x="360" y="232" text-anchor="middle" class="node-desc">归因根因</text>

  <line x1="360" y1="238" x2="360" y2="264" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 右分支分叉 -->
  <line x1="360" y1="264" x2="315" y2="264" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="360" y1="264" x2="405" y2="264" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="315" y1="264" x2="315" y2="280" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="405" y1="264" x2="405" y2="280" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="270" y="284" width="90" height="34" rx="6" fill="#fff4e6" stroke="#f76707" stroke-width="0.8" fill-opacity="0.3"/>
  <text x="315" y="300" text-anchor="middle" class="node-desc">⚠️ 检查点注入</text>
  <text x="315" y="314" text-anchor="middle" class="node-desc">回滚 / 重试策略</text>

  <rect x="362" y="284" width="90" height="34" rx="6" fill="#fff4e6" stroke="#f76707" stroke-width="0.8" fill-opacity="0.3"/>
  <text x="407" y="300" text-anchor="middle" class="node-desc">🧪 Critic 训练数据</text>
  <text x="407" y="314" text-anchor="middle" class="node-desc">标记错误行为</text>

  <!-- ===== 底部汇合 ===== -->
  <line x1="95" y1="318" x2="155" y2="340" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="195" y1="318" x2="225" y2="340" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="315" y1="318" x2="275" y2="340" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="405" y1="318" x2="345" y2="340" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <rect x="155" y="346" width="190" height="38" rx="19" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="250" y="366" text-anchor="middle" class="node-title">📊 经验摘要库</text>
  <text x="250" y="380" text-anchor="middle" class="node-desc">持续更新 → 驱动自进化</text>
</svg>