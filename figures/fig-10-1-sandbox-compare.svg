<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" width="620" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 16px; font-weight: 600; fill: #1e1e1e; }
      .th-text { font-size: 12px; font-weight: 600; fill: #ffffff; }
      .row-label { font-size: 12px; font-weight: 600; fill: #1e1e1e; }
      .cell-text { font-size: 11px; font-weight: 500; fill: #495057; }
      .tag-good { font-size: 10px; font-weight: 600; fill: #2b8a3e; }
      .tag-mid { font-size: 10px; font-weight: 600; fill: #e8590c; }
      .tag-bad { font-size: 10px; font-weight: 600; fill: #c92a2a; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="620" height="300" fill="#ffffff" rx="8"/>

  <!-- 标题 -->
  <text x="310" y="28" text-anchor="middle" class="title">Fig. 10.1  沙箱方案对比</text>

  <!-- ===== 表头 ===== -->
  <rect x="10" y="40" width="115" height="36" rx="4" fill="#495057"/>
  <text x="67" y="63" text-anchor="middle" class="th-text">方案</text>

  <rect x="125" y="40" width="120" height="36" rx="4" fill="#495057"/>
  <text x="185" y="63" text-anchor="middle" class="th-text">隔离性</text>

  <rect x="245" y="40" width="120" height="36" rx="4" fill="#495057"/>
  <text x="305" y="63" text-anchor="middle" class="th-text">启动延迟</text>

  <rect x="365" y="40" width="120" height="36" rx="4" fill="#495057"/>
  <text x="425" y="63" text-anchor="middle" class="th-text">内存开销</text>

  <rect x="485" y="40" width="125" height="36" rx="4" fill="#495057"/>
  <text x="547" y="63" text-anchor="middle" class="th-text">工具生态</text>

  <!-- ===== 第 1 行：Docker ===== -->
  <rect x="10" y="78" width="115" height="36" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="67" y="100" text-anchor="middle" class="row-label">Docker</text>

  <rect x="125" y="78" width="120" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="185" y="100" text-anchor="middle" class="cell-text">中等</text>

  <rect x="245" y="78" width="120" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="305" y="100" text-anchor="middle" class="cell-text">2-5 秒</text>

  <rect x="365" y="78" width="120" height="36" rx="4" fill="#ffe0e0" stroke="#ffc9c9" stroke-width="1"/>
  <text x="425" y="100" text-anchor="middle" class="cell-text">200-500 MB</text>

  <rect x="485" y="78" width="125" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="547" y="100" text-anchor="middle" class="cell-text">全</text>

  <!-- ===== 第 2 行：Firecracker ===== -->
  <rect x="10" y="116" width="115" height="36" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="67" y="138" text-anchor="middle" class="row-label">Firecracker</text>

  <rect x="125" y="116" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="185" y="138" text-anchor="middle" class="cell-text">强</text>

  <rect x="245" y="116" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="305" y="138" text-anchor="middle" class="cell-text">&lt; 200 ms</text>

  <rect x="365" y="116" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="425" y="138" text-anchor="middle" class="cell-text">5 MB/实例</text>

  <rect x="485" y="116" width="125" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="547" y="138" text-anchor="middle" class="cell-text">全</text>

  <!-- ===== 第 3 行：gVisor ===== -->
  <rect x="10" y="154" width="115" height="36" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="67" y="176" text-anchor="middle" class="row-label">gVisor</text>

  <rect x="125" y="154" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="185" y="176" text-anchor="middle" class="cell-text">强</text>

  <rect x="245" y="154" width="120" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="305" y="176" text-anchor="middle" class="cell-text">1-2 秒</text>

  <rect x="365" y="154" width="120" height="36" rx="4" fill="#ffe0e0" stroke="#ffc9c9" stroke-width="1"/>
  <text x="425" y="176" text-anchor="middle" class="cell-text">100-300 MB</text>

  <rect x="485" y="154" width="125" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="547" y="176" text-anchor="middle" class="cell-text">受限（系统调用翻译）</text>

  <!-- ===== 第 4 行：WASM ===== -->
  <rect x="10" y="192" width="115" height="36" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="67" y="214" text-anchor="middle" class="row-label">WASM</text>

  <rect x="125" y="192" width="120" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="185" y="214" text-anchor="middle" class="cell-text">中等</text>

  <rect x="245" y="192" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="305" y="214" text-anchor="middle" class="cell-text">&lt; 5 ms</text>

  <rect x="365" y="192" width="120" height="36" rx="4" fill="#d3f9d8" stroke="#b2f2bb" stroke-width="1"/>
  <text x="425" y="214" text-anchor="middle" class="cell-text">&lt; 10 MB</text>

  <rect x="485" y="192" width="125" height="36" rx="4" fill="#fff4e6" stroke="#ffd8a8" stroke-width="1"/>
  <text x="547" y="214" text-anchor="middle" class="cell-text">受限（WASM 生态）</text>

</svg>