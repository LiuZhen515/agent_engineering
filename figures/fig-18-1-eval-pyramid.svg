<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="520" height="420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .layer-label { font-size: 11px; font-weight: 600; }
      .layer-sub { font-size: 10px; font-weight: 400; fill: #495057; }
      .layer-q { font-size: 12px; font-weight: 400; fill: #495057; }
      .side-label { font-size: 11px; fill: #868e96; }
      .caption { font-size: 10px; fill: #adb5bd; }
    </style>
  </defs>

  <rect width="520" height="420" fill="#ffffff" rx="8"/>
  <text x="260" y="24" text-anchor="middle" class="title">Fig. 18.1  四层评估金字塔</text>

  <!-- ===== 金字塔：中心 x=240 ===== -->

  <!-- L4（三角形塔尖） -->
  <polygon points="240,50 280,92 200,92" fill="#f3f0ff" stroke="#9775fa" stroke-width="2"/>
  <text x="240" y="74" text-anchor="middle" class="layer-label" fill="#6741d9">L4</text>
  <text x="240" y="88" text-anchor="middle" class="layer-sub">Loop 端到端基准</text>

  <!-- L3 -->
  <polygon points="200,92 280,92 315,134 165,134" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="240" y="112" text-anchor="middle" class="layer-label" fill="#1971c2">L3</text>
  <text x="240" y="126" text-anchor="middle" class="layer-sub">Harness 集成测试</text>

  <!-- L2 -->
  <polygon points="165,134 315,134 350,176 130,176" fill="#ebfbee" stroke="#40c057" stroke-width="2"/>
  <text x="240" y="154" text-anchor="middle" class="layer-label" fill="#2b8a3e">L2</text>
  <text x="240" y="168" text-anchor="middle" class="layer-sub">Context 召回与忠实度</text>

  <!-- L1（底） -->
  <polygon points="130,176 350,176 385,218 95,218" fill="#fff4e6" stroke="#f76707" stroke-width="2"/>
  <text x="240" y="196" text-anchor="middle" class="layer-label" fill="#d9480f">L1</text>
  <text x="240" y="210" text-anchor="middle" class="layer-sub">Prompt 单元测试</text>

  <!-- ===== 右侧引用标注 ===== -->
  <text x="380" y="80" text-anchor="start" class="layer-q">"任务完成了吗？"</text>

  <text x="380" y="122" text-anchor="start" class="layer-q">"系统跑得稳吗？"</text>

  <text x="380" y="164" text-anchor="start" class="layer-q">"信息找对了吗？"</text>

  <text x="380" y="206" text-anchor="start" class="layer-q">"指令理解了吗？"</text>

  <!-- ===== 左侧整体标注 ===== -->
  <line x1="76" y1="218" x2="76" y2="74" stroke="#adb5bd" stroke-width="1.5"/>
  <polygon points="72,74 76,62 80,74" fill="#adb5bd"/>
  <text x="68" y="150" text-anchor="end" transform="rotate(-90,68,150)" class="side-label">集成度 ↑</text>

  <!-- ===== 底部说明 ===== -->
  <rect x="60" y="248" width="400" height="56" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="260" y="268" text-anchor="middle" class="layer-sub" fill="#495057">端到端指标下降时，按金字塔顺序向下排查</text>
  <text x="260" y="286" text-anchor="middle" class="layer-sub" fill="#495057">排查顺序：L4 → L3 → L2 → L1</text>

</svg>