<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" width="620" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .header { font-size: 13px; font-weight: 700; fill: #ffffff; }
      .row-label { font-size: 12px; font-weight: 600; fill: #1e1e1e; }
      .cell { font-size: 12px; font-weight: 400; fill: #495057; }
      .caption { font-size: 10px; fill: #adb5bd; }
    </style>
  </defs>

  <rect width="620" height="340" fill="#ffffff" rx="8"/>
  <text x="310" y="26" text-anchor="middle" class="title">Fig. 18.2  三大基准对比</text>

  <!-- ===== 表格参数 ===== -->
  <!-- 列0（维度）: x=16, w=80 -->
  <!-- 列1（SWE-bench）: x=100, w=160 -->
  <!-- 列2（GAIA）: x=264, w=160 -->
  <!-- 列3（AgentBench）: x=428, w=160 -->

  <!-- 表头 -->
  <rect x="16" y="40" width="80" height="36" rx="4" fill="#495057"/>
  <rect x="96" y="40" width="164" height="36" rx="0" fill="#9775fa"/>
  <rect x="260" y="40" width="164" height="36" rx="0" fill="#339af0"/>
  <rect x="424" y="40" width="164" height="36" rx="4" fill="#40c057"/>

  <text x="56" y="62" text-anchor="middle" class="header">维度</text>
  <text x="178" y="62" text-anchor="middle" class="header">SWE-bench</text>
  <text x="342" y="62" text-anchor="middle" class="header">GAIA</text>
  <text x="506" y="62" text-anchor="middle" class="header">AgentBench</text>

  <!-- 第 1 行：领域 -->
  <rect x="16" y="76" width="80" height="38" rx="0" fill="#f3f0ff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="76" width="164" height="38" rx="0" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="76" width="164" height="38" rx="0" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="76" width="164" height="38" rx="0" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="100" text-anchor="middle" class="row-label">领域</text>
  <text x="178" y="100" text-anchor="middle" class="cell">编码</text>
  <text x="342" y="100" text-anchor="middle" class="cell">通用</text>
  <text x="506" y="100" text-anchor="middle" class="cell">多维度</text>

  <!-- 第 2 行：任务数 -->
  <rect x="16" y="114" width="80" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="114" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="114" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="114" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="138" text-anchor="middle" class="row-label">任务数</text>
  <text x="178" y="138" text-anchor="middle" class="cell">2,294</text>
  <text x="342" y="138" text-anchor="middle" class="cell">466</text>
  <text x="506" y="138" text-anchor="middle" class="cell">多子集</text>

  <!-- 第 3 行：工具需求 -->
  <rect x="16" y="152" width="80" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="152" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="152" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="152" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="176" text-anchor="middle" class="row-label">工具需求</text>
  <text x="178" y="176" text-anchor="middle" class="cell">中</text>
  <text x="342" y="176" text-anchor="middle" class="cell">高 (多工具组合)</text>
  <text x="506" y="176" text-anchor="middle" class="cell">高 (多场景)</text>

  <!-- 第 4 行：测量指标 -->
  <rect x="16" y="190" width="80" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="190" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="190" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="190" width="164" height="38" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="214" text-anchor="middle" class="row-label">测量指标</text>
  <text x="178" y="214" text-anchor="middle" class="cell">Resolve rate</text>
  <text x="342" y="214" text-anchor="middle" class="cell">准确率</text>
  <text x="506" y="214" text-anchor="middle" class="cell">多子集分</text>

  <!-- 第 5 行：数据时效 -->
  <rect x="16" y="228" width="80" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="228" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="228" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="228" width="164" height="38" fill="#ffffff" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="252" text-anchor="middle" class="row-label">数据时效</text>
  <text x="178" y="252" text-anchor="middle" class="cell">2024</text>
  <text x="342" y="252" text-anchor="middle" class="cell">2023-2024</text>
  <text x="506" y="252" text-anchor="middle" class="cell">2023-2024</text>

  <!-- 第 6 行：主要局限 -->
  <rect x="16" y="266" width="80" height="38" rx="0" fill="#f3f0ff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="96" y="266" width="164" height="38" rx="0" fill="#f3f0ff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="260" y="266" width="164" height="38" rx="0" fill="#e7f5ff" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="424" y="266" width="164" height="38" rx="4" fill="#ebfbee" stroke="#dee2e6" stroke-width="0.5"/>
  <rect x="16" y="266" width="572" height="38" rx="4" fill="none" stroke="#dee2e6" stroke-width="0.5"/>

  <text x="56" y="290" text-anchor="middle" class="row-label">主要局限</text>
  <text x="178" y="290" text-anchor="middle" class="cell">Python 单一</text>
  <text x="342" y="290" text-anchor="middle" class="cell">规模较小</text>
  <text x="506" y="290" text-anchor="middle" class="cell">子基准不均</text>

</svg>