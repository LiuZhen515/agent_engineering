<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" width="620" height="420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .sub { font-size: 11px; font-weight: 400; fill: #868e96; }
      .trace-label { font-size: 13px; font-weight: 700; fill: #1e1e1e; }
      .span-label { font-size: 12px; font-weight: 600; }
      .attr-label { font-size: 10px; font-weight: 400; fill: #495057; font-family: 'Source Code Pro', 'Inter', monospace; }
      .event-label { font-size: 10px; font-weight: 400; fill: #495057; font-family: 'Source Code Pro', 'Inter', monospace; }
      .tree-line { font-size: 11px; fill: #adb5bd; font-family: 'Source Code Pro', 'Inter', monospace; }
    </style>
  </defs>

  <rect width="620" height="420" fill="#ffffff" rx="8"/>
  <text x="310" y="26" text-anchor="middle" class="title">Fig. 12.1  Agent 执行的 Trace / Span 结构</text>
  <text x="310" y="42" text-anchor="middle" class="sub">单个 Trace 包含多个 Span，形成嵌套树</text>

  <line x1="30" y1="52" x2="590" y2="52" stroke="#dee2e6" stroke-width="0.5"/>

  <!-- ===== Trace 根 ===== -->
  <text x="40" y="72" class="trace-label">Trace: "审查 pull request #123"</text>

  <!-- ===== Span 1 ===== -->
  <text x="40" y="98" class="tree-line">├──</text>
  <text x="80" y="98" class="span-label" fill="#6741d9">Span 1: llm_call（父 Span）</text>

  <text x="40" y="118" class="tree-line">│</text>
  <text x="80" y="118" class="tree-line">├──</text>
  <text x="120" y="118" class="attr-label">Attribute: model=gpt-4o, input_tokens=4500, output_tokens=200</text>

  <text x="40" y="136" class="tree-line">│</text>
  <text x="80" y="136" class="tree-line">├──</text>
  <text x="120" y="136" class="event-label">Event: "LLM 返回: 需要先读文件再搜索"</text>

  <text x="40" y="156" class="tree-line">│</text>
  <text x="80" y="156" class="tree-line">├──</text>
  <text x="120" y="156" class="span-label" fill="#d9480f">Child Span 1.1: tool_run (read_file)</text>

  <text x="40" y="176" class="tree-line">│</text>
  <text x="80" y="176" class="tree-line">│</text>
  <text x="120" y="176" class="tree-line">├──</text>
  <text x="160" y="176" class="attr-label">Attribute: tool=read_file, path=src/main.py, duration=15ms</text>

  <text x="40" y="194" class="tree-line">│</text>
  <text x="80" y="194" class="tree-line">│</text>
  <text x="120" y="194" class="tree-line">└──</text>
  <text x="160" y="194" class="event-label">Event: "文件读取成功"</text>

  <!-- Child Span 1.2 -->
  <text x="40" y="218" class="tree-line">│</text>
  <text x="80" y="218" class="tree-line">└──</text>
  <text x="120" y="218" class="span-label" fill="#d9480f">Child Span 1.2: tool_run (search_docs)</text>

  <text x="40" y="238" class="tree-line">│</text>
  <text x="120" y="238" class="tree-line">├──</text>
  <text x="160" y="238" class="attr-label">Attribute: tool=search_docs, query=FIXME, count=5, duration=1.2s</text>

  <text x="40" y="256" class="tree-line">│</text>
  <text x="120" y="256" class="tree-line">└──</text>
  <text x="160" y="256" class="event-label">Event: "搜索完成，找到 5 个 FIXME 标记"</text>

  <!-- ===== Span 2 ===== -->
  <text x="40" y="286" class="tree-line">├──</text>
  <text x="80" y="286" class="span-label" fill="#6741d9">Span 2: llm_call（生成报告）</text>

  <text x="40" y="306" class="tree-line">│</text>
  <text x="80" y="306" class="tree-line">├──</text>
  <text x="120" y="306" class="attr-label">Attribute: model=gpt-4o, input_tokens=6200, output_tokens=1500</text>

  <text x="40" y="324" class="tree-line">│</text>
  <text x="80" y="324" class="tree-line">└──</text>
  <text x="120" y="324" class="event-label">Event: "报告已生成"</text>

  <!-- ===== Trace End ===== -->
  <text x="40" y="352" class="tree-line">└──</text>
  <text x="80" y="352" class="trace-label">Trace End</text>

  <line x1="30" y1="370" x2="590" y2="370" stroke="#dee2e6" stroke-width="0.5"/>

</svg>